<header class="hero">
<h1>Calculadora de Regla de Tres</h1>
<p>Resuelve una regla de tres simple en segundos.</p>
</header>

<section style="max-width:700px;margin:auto;padding:30px;">

<input id="a" type="number" placeholder="Valor A">

<br><br>

<input id="b" type="number" placeholder="Valor B">

<br><br>

<input id="c" type="number" placeholder="Valor C">

<br><br>

<button onclick="calcular()">Calcular</button>

<h2 id="resultado"></h2>

<hr>

<h2>¿Qué es una regla de tres?</h2>

<p>
La regla de tres es un método matemático para calcular un valor desconocido a partir de tres valores conocidos.
</p>

</section>

<script>

function calcular(){

const a=Number(document.getElementById("a").value);
const b=Number(document.getElementById("b").value);
const c=Number(document.getElementById("c").value);

if(!a || !b || !c){

document.getElementById("resultado").innerHTML="Introduce todos los valores.";

return;

}

const x=(b*c)/a;

document.getElementById("resultado").innerHTML=
`Resultado: <strong>${x.toFixed(2)}</strong>`;

}

</script>
